server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 30000
    max-connections: 10000
    uri-encoding: UTF-8

spring:
  application:
    name: taxi-analytics-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  http:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
      force-request: true
      force-response: true
  datasource:
    dynamic:
      primary: ads
      strict: false
      datasource:
        ads:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST:192.168.127.102}:${MYSQL_PORT:3306}/nyc_taxi_ads?useUnicode=true&characterEncoding=utf8&characterSetResults=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:BAi@123456}
          hikari:
            connection-init-sql: SET NAMES utf8mb4
            connection-properties: characterEncoding=utf8;useUnicode=true;characterSetResults=utf8mb4
        quality:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST:192.168.127.102}:${MYSQL_PORT:3306}/nyc_taxi_quality?useUnicode=true&characterEncoding=utf8&characterSetResults=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:BAi@123456}
          hikari:
            connection-init-sql: SET NAMES utf8mb4
            connection-properties: characterEncoding=utf8;useUnicode=true;characterSetResults=utf8mb4
        ai:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST:192.168.127.102}:${MYSQL_PORT:3306}/nyc_taxi_ai?useUnicode=true&characterEncoding=utf8&characterSetResults=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:BAi@123456}
          hikari:
            connection-init-sql: SET NAMES utf8mb4
            connection-properties: characterEncoding=utf8;useUnicode=true;characterSetResults=utf8mb4
        realtime:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST:192.168.127.102}:${MYSQL_PORT:3306}/nyc_taxi_realtime?useUnicode=true&characterEncoding=utf8&characterSetResults=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: ${MYSQL_USER:root}
          password: ${MYSQL_PASSWORD:BAi@123456}
          hikari:
            connection-init-sql: SET NAMES utf8mb4
            connection-properties: characterEncoding=utf8;useUnicode=true;characterSetResults=utf8mb4
      hikari:
        minimum-idle: 5
        maximum-pool-size: 20
        idle-timeout: 300000
        connection-timeout: 30000
        pool-name: TaxiAnalyticsHikariPool
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.taxi.analytics.modules.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-statement-timeout: 30
    jdbc-type-for-null: 'null'

# 异步导出配置
taxi:
  analytics:
    export:
      max-rows: 100000
      max-concurrent-tasks: 5
      task-expire-minutes: 1440
      file-retention-hours: 24
      temp-dir: /tmp/exports
      chunk-size: 10000
    query:
      max-date-range-days: 90
      default-page-size: 20
      max-page-size: 500
      default-top-n: 30
      max-top-n: 100
    cache:
      enabled: false
      ttl:
        kpi: 300
        chart: 1800
    extension:
      mining-enabled: false
      realtime-enabled: false

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 日志配置
logging:
  level:
    com.taxi.analytics: DEBUG
    com.taxi.analytics.modules.**.mapper: DEBUG

