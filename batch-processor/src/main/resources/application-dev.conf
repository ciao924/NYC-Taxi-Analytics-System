# ==================== 开发环境配置（v4-lite-fixed）====================

spark {
  warehouse.dir = "hdfs://192.168.127.102:8020/user/hive_local/warehouse"
  shuffle-partitions = 200
  adaptive-skew-join-skewed-partition-threshold = "32MB"
  adaptive-advisory-partition-size = "64MB"
  dynamic-allocation-enabled = false

  # 【新增】内存配置 - 解决缓存溢写问题
  driver-memory = "8g"
  driver-memory-overhead = "2g"
  executor-memory = "8g"
  executor-memory-overhead = "2g"
  executor-cores = 4

  # 【新增】内存管理配置
  memory-fraction = 0.8
  memory-storage-fraction = 0.5
  auto-broadcast-join-threshold = "50MB"
}

hive {
  metastore.uris = "thrift://192.168.127.102:9083"
}

mysql {
  host = "192.168.127.102"
  port = 3306
  database = "nyc_taxi_ads"
  user = "root"
  password = "BAi@123456"
  batch-size = 10000
  fetch-size = 5000
  write-partitions = 5
  max-retries = 3
  retry-base-delay-ms = 1000
}

join {
  broadcast-threshold-mb = 5
  auto-strategy-enabled = true
}

cache {
  enabled = true
  storage-level = "MEMORY_AND_DISK_SER"
  skip-threshold = 50000000
  min-reuse-count = 1
}

observability {
  listener-enabled = true
  cost-observation-enabled = true
}

# ==================== 质量检测配置（修正版）====================
quality {
  # 是否在检测失败时终止任务（开发环境设为 false，允许继续）
  fail-on-failure = false

  # 死信表配置
  dead-letter-enabled = true
  dead-letter-max-records = 10000

  # 异常检测阈值（放宽到 5%）
  anomaly-threshold = 0.05

  # 范围检测阈值
  range-threshold = 2.0

  # 范围检测采样率
  range-check-sample-rate = 0.1

  # 留存率期望范围（放宽，因为数据清洗会删除异常数据）
  expected-retention-rate-min = 70.0
  expected-retention-rate-max = 95.0

  # 【新增】数据范围阈值（与 DWD 清洗逻辑保持一致）
  max-trip-distance = 120.0
  max-total-amount = 800.0
  max-passenger-count = 6
  min-passenger-count = 1
  max-duration-minutes = 240.0
  min-duration-minutes = 1.0

  # 唯一性检测配置（允许极少量重复）
  uniqueness-sample-threshold = 1000000
  uniqueness-sample-fraction = 0.1
  use-approx-count = true
  # 允许的重复率上限（0.01%）
  uniqueness-tolerance = 0.0001
}

# ==================== ADS 层配置（新增）====================
ads {
  default-start-date = "2025-01-01"
  default-end-date = "2025-03-31"

  # HourlyDistribution 允许缺失的小时数（因为某些小时可能无数据）
  hourly-missing-tolerance = 10

  # 热点区域最小预期行数倍数
  hotspot-min-rows-multiplier = 200

  # 区域流量表最小预期行数倍数
  borough-flow-min-rows-multiplier = 25
}

# ==================== DWD 层配置 ====================
dwd {
  # 唯一性检测配置
  uniqueness-check-enabled = true
  # 允许的重复率上限
  uniqueness-tolerance = 0.0001
}

# ==================== DWS 层配置 ====================
dws {
  salt-buckets = 10
  skewed-vendors = [1, 2]
  repartition-num = 40
}

rollback {
  enabled = false
  backup-retention-days = 7
}

iceberg {
  enabled = false
  warehouse.path = "hdfs://192.168.127.102:8020/user/iceberg/warehouse"
}

# ==================== 日志配置 ====================
logging {
  level = "DEBUG"
  enable-file-log = true
  log-file-path = "logs/dev/ads_layer.log"
  log-file-max-size = "100MB"
  log-file-max-backup = 10
}