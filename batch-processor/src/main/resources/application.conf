# ==================== 出租车大数据分析系统配置文件 ====================
# 调度器会通过 -Denvironment=dev/prod 注入环境标识

environment = ${?ENVIRONMENT}
environment = "dev"

include "application-${environment}.conf"

# ==================== 系统版本 ====================
system {
  version = "v4-lite-fixed"
  build-date = "2026-01-15"
}

# ==================== 通用配置 ====================
common {
  target-year = 2025
  target-months = [1, 2, 3]
  default-start-date = "2025-01-01"
  default-end-date = "2025-03-31"
}

# ==================== 数据路径配置 ====================
data {
  ods {
    path = ${?DATA_ODS_PATH}
    path = "src/main/scala/data"
  }
  write {
    default-partitions = 40
  }
}

# ==================== Spark 配置 ====================
spark {
  warehouse.dir = ${?SPARK_WAREHOUSE_DIR}
  warehouse.dir = "hdfs://192.168.127.102:8020/user/hive_local/warehouse"

  hive.metastore.uris = ${?HIVE_METASTORE_URIS}
  hive.metastore.uris = "thrift://192.168.127.102:9083"

  shuffle-partitions = 200
  adaptive-enabled = true
  adaptive-coalesce-partitions-enabled = true
  adaptive-skew-join-enabled = true
  adaptive-skew-join-skewed-partition-threshold = "64MB"
  adaptive-advisory-partition-size = "128MB"
  adaptive-min-num-post-shuffle-partitions = 20
  auto-broadcast-join-threshold = "50MB"

  parquet-compression-codec = "snappy"
  io-compression-codec = "snappy"
  serializer = "org.apache.spark.serializer.KryoSerializer"
  kryoserializer-buffer-max = "512m"

  dynamic-allocation-enabled = true
  dynamic-allocation-max-executors = 50
  dynamic-allocation-min-executors = 5

  # 【新增】内存配置（会被环境配置覆盖）
  memory-fraction = 0.8
  memory-storage-fraction = 0.5
}

# ==================== Join 策略配置 ====================
join {
  broadcast-threshold-mb = 10
  auto-strategy-enabled = true
}

# ==================== 缓存配置（行为驱动）====================
cache {
  enabled = true
  storage-level = "MEMORY_AND_DISK_SER"
  skip-threshold = 50000000
  min-reuse-count = 2
}

# ==================== 观测配置 ====================
observability {
  listener-enabled = true
  cost-observation-enabled = false
}

# ==================== 质量检测配置（修正版）====================
quality {
  # 是否在检测失败时终止任务
  fail-on-failure = false

  # 死信表配置
  dead-letter-enabled = true
  dead-letter-max-records = 10000

  # 异常检测阈值（5%）
  anomaly-threshold = 0.05

  # 范围检测阈值
  range-threshold = 2.0

  # 范围检测采样率
  range-check-sample-rate = 0.1

  # 留存率期望范围（放宽）
  expected-retention-rate-min = 70.0
  expected-retention-rate-max = 95.0

  # 数据范围阈值
  max-trip-distance = 120.0
  max-total-amount = 800.0
  max-passenger-count = 6
  min-passenger-count = 1
  max-duration-minutes = 240.0
  min-duration-minutes = 1.0

  # 唯一性检测配置
  uniqueness-sample-threshold = 1000000
  uniqueness-sample-fraction = 0.1
  use-approx-count = true
  uniqueness-tolerance = 0.0001
}

# ==================== ADS 层配置 ====================
ads {
  default-start-date = "2025-01-01"
  default-end-date = "2025-03-31"

  # HourlyDistribution 允许缺失的小时数
  hourly-missing-tolerance = 10

  # 热点区域最小预期行数倍数
  hotspot-min-rows-multiplier = 200

  # 区域流量表最小预期行数倍数
  borough-flow-min-rows-multiplier = 25
}

# ==================== DWD 层配置 ====================
dwd {
  uniqueness-check-enabled = true
  uniqueness-tolerance = 0.0001
}

# ==================== DWS 层配置 ====================
dws {
  salt-buckets = 10
  skewed-vendors = [1, 2]
  repartition-num = 40
}

# ==================== 回滚配置 ====================
rollback {
  enabled = false
  backup-retention-days = 7
}

# ==================== Iceberg 配置 ====================
iceberg {
  enabled = false
  warehouse.path = "hdfs://192.168.127.102:8020/user/iceberg/warehouse"
}

# ==================== 日志配置 ====================
logging {
  level = "INFO"
  enable-file-log = true
  log-file-path = "logs/ads_layer.log"
  log-file-max-size = "100MB"
  log-file-max-backup = 10
}