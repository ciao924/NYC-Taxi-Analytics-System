# ==================== Common Configuration ====================
# Kafka Configuration (Shared)
kafka.bootstrap.servers=hadoop102:9092,hadoop103:9092,hadoop104:9092
kafka.topic=taxi_trip_green
kafka.topics=taxi_trip_green,taxi_trip_yellow
kafka.consumer.auto.offset.reset=earliest
kafka.consumer.session.timeout.ms=30000
kafka.consumer.max.poll.records=500

# Flink Configuration (Shared)
flink.parallelism=1
flink.execution.buffer.timeout=100
flink.taskmanager.network.memory.fraction=0.1

