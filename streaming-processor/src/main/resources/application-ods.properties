# ==================== ODS Job Configuration ====================
# Kafka Configuration
kafka.bootstrap.servers=hadoop102:9092,hadoop103:9092,hadoop104:9092
kafka.topic=taxi_trip_green
kafka.topics=taxi_trip_green,taxi_trip_yellow
kafka.consumer.group.id=flink-taxi-ods-group-v2
kafka.consumer.auto.offset.reset=earliest
kafka.consumer.session.timeout.ms=30000
kafka.consumer.max.poll.records=500

# Flink Configuration
flink.checkpoint.interval=120000
flink.checkpoint.timeout=600000
flink.parallelism=2
flink.checkpoint.storage.path=hdfs://hadoop102:8020/flink/checkpoints/ods
flink.execution.buffer.timeout=100
flink.taskmanager.network.memory.fraction=0.1

# Hive Configuration
hive.metastore.uris=thrift://192.168.127.102:9083
hive.database=nyc_taxi_ods
hive.table.green=taxi_trip_green_ods
hive.table.yellow=taxi_trip_yellow_ods
hive.batch.size=1000
hive.batch.interval.ms=5000

# FileSink + ORC Configuration (与 hive-site.xml hive.metastore.warehouse.dir 保持一致)
hive.warehouse.path=hdfs://192.168.127.102:8020/user/hive_local/warehouse/nyc_taxi_ods.db/taxi_trip_green_ods

# ODS Data Path (与离线模块保持一致)
data.ods.path=hdfs://192.168.127.102:8020/user/hive_local/warehouse/nyc_taxi_ods.db/taxi_trip_yellow_ods

# ORC Compression (SNAPPY, ZLIB, LZO, NONE)
hive.orc.compress=SNAPPY

# ORC Stripe Size 256MB
hive.orc.stripe.size=268435456

# ORC Row Index Stride
hive.orc.row.index.stride=10000

# Data Quality Configuration
data.quality.filter.enabled=true

# MySQL Configuration (for dead letter sink and compatibility)
mysql.url=jdbc:mysql://192.168.127.102:3306/nyc_taxi_realtime?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
mysql.username=root
mysql.password=BAi@123456
mysql.table=realtime_trip_green
mysql.batch.size=1000
mysql.batch.interval.ms=5000
mysql.sink.parallelism=2